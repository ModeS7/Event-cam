# Driver parameters for evk4.launch.py (our OpenEB-based evk4_driver).
#
# Applied when the camera STARTS -> edit + relaunch to take effect. One
# related knob lives elsewhere (see docs/tuning.md):
#   - rendered-video fps           -> evk4.launch.py `fps` / `display_type` args
# Biases can be set here too (e.g. `bias_diff_on: 30`) and stay live-tunable
# with `ros2 param set` / rqt_reconfigure.
#
# Set from launch arguments (not here): serial, frame_id,
# sync_mode, trigger_in_mode, settings. Everything else is fair game below;
# `params_file:=<your.yaml>` swaps this whole file.
/**:
  ros__parameters:
    # --- Timing / batching -----------------------------------------------
    # Raw EVT3 is published once this much wall time has accumulated. Smaller
    # = lower latency, more/smaller messages.
    event_message_time_threshold: 0.001  # [s] (default: 1 ms)

    # --- Performance / diagnostics ---------------------------------------
    # use_multithreading: true        # capture on a worker thread (default) so
    #                                 # the SDK callback never blocks on ROS at
    #                                 # high event rates; false = pack inline
    # statistics_print_interval: 1.0  # [s] per-second "msgs/s, MB/s" log;
    #                                 # 0 disables it

    # =====================================================================
    # ON-SENSOR FILTERS / FACILITIES  (the EVK4/IMX636 ESP blocks)
    # Applied at camera start. Full "which knob for which symptom" guidance
    # in docs/tuning.md. Anything the sensor lacks is skipped with a warning.
    # =====================================================================

    # --- ERC: Event Rate Controller --------------------------------------
    # Caps the event rate on-sensor to protect USB bandwidth and CPU.
    # erc_mode: enabled       # na | disabled | enabled  (default: na = leave alone)
    # erc_rate: 100000000     # [events/s]

    # --- Trail / STC: on-sensor noise + trail filtering ------------------
    # trail_filter: true
    # trail_filter_type: trail      # trail | stc_cut_trail | stc_keep_trail
    # trail_filter_threshold: 5000  # [us]

    # --- AFK: Anti-Flicker -----------------------------------------------
    # Removes flickering light on-sensor. Lamps flicker at 2x the mains
    # frequency, so bracket that: 90-110 below targets the 100 Hz flicker of
    # 50 Hz grids (Europe); on a 60 Hz grid (US) use 110-130 for 120 Hz.
    # afk_enabled: true
    # afk_freq_low_hz: 90
    # afk_freq_high_hz: 110
    # afk_mode: band_stop     # band_stop (reject the band) | band_pass (keep only it)

    # --- Digital Crop: drop pixels outside a rectangle on-sensor ---------
    # A single hard rectangle [x_start, y_start, x_end, y_end] (cf. ROI windows).
    # digital_crop_enabled: true
    # digital_crop_region: [100, 100, 500, 400]
    # digital_crop_reset_origin: false   # true: remap the cropped corner to (0,0)

    # --- Digital Event Mask: blank out individual hot pixels -------------
    # Flat list of [x0,y0, x1,y1, ...] pixels to mask (limited # of HW slots).
    # event_mask_pixels: [320, 240, 640, 360]

    # --- Region of interest ----------------------------------------------
    # Keep only pixels in the given rectangle(s); [x, y, w, h] per region.
    # roi: [320, 180, 640, 360]
    # roni: true              # invert: treat roi as region of NON-interest

    # --- ERAF: Event Rate Activity Filter --------------------------------
    # NOTE: not implemented by the IMX636/EVK4 (skipped with a warning); these
    # params exist for other Prophesee sensors that do support it.
    # eraf_enabled: true
    # eraf_lower_start: 1000
    # eraf_lower_stop: 2000
    # eraf_upper_start: 20000000
    # eraf_upper_stop: 15000000

    # Note: trigger-OUT is not exposed -- EVK4 (Gen4) does not support it.
    # Biases: settable here for startup (bias_diff_on, bias_diff_off, bias_fo,
    # bias_hpf, bias_refr) and live at runtime -- see docs/tuning.md and the
    # commented examples in evk4_params_recommended.yaml.
