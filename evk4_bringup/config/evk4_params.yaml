# Driver (metavision_driver) parameters for evk4.launch.py.
#
# This file is the DRIVER's timing/filtering config. Two related knobs live
# elsewhere (see docs/tuning.md):
#   - rendered-video fps          -> evk4.launch.py `fps` / `display_type` args
#   - biases (contrast thresholds) -> runtime, `ros2 param set` / rqt_reconfigure
#
# Defaults below were verified against the RELEASED 3.0.0 source (the upstream
# master README differs in places!):
#   https://github.com/ros-event-camera/metavision_driver/blob/3.0.0/src/driver_ros2.cpp
#
# Set from launch arguments (not here): serial, bias_file, frame_id,
# sync_mode, trigger_in_mode, settings. Everything else is fair game below;
# `params_file:=<your.yaml>` swaps this whole file.
/**:
  ros__parameters:
    encoding: evt3  # the only supported encoding (driver default)

    # --- Timing / batching -----------------------------------------------
    # Events are published once either threshold is reached; in practice the
    # time threshold governs (the size threshold defaults to ~1 GB, i.e. off).
    # Smaller = lower latency, more messages.
    event_message_time_threshold: 0.001  # [s] (driver default: 1 ms)

    # --- Event Rate Control (EVK4 / Gen4 on-sensor feature) ---------------
    # Drops events on-sensor to protect USB bandwidth and CPU when the scene
    # is very active. Uncomment to enable:
    # erc_mode: enabled       # na | disabled | enabled  (default: na)
    # erc_rate: 100000000     # [events/s]               (default: 1e8)

    # --- On-sensor noise filtering ---------------------------------------
    # trail_filter: true            # (default: false)
    # trail_filter_type: trail      # trail | stc_cut_trail | stc_keep_trail
    # trail_filter_threshold: 5000  # (default: 0)

    # --- Region of interest ----------------------------------------------
    # Keep only pixels in the given rectangle(s); [x, y, w, h] per region.
    # roi: [320, 180, 640, 360]
    # roni: true                    # invert: treat roi as region of NON-interest

    # --- Performance ------------------------------------------------------
    # SDK callback is decoupled from ROS publishing by default (3.0.0):
    # use_multithreading: false     # (default: true)
    # send_queue_size: 1000         # outgoing message queue depth (default)

    # --- Advanced / rarely changed ---------------------------------------
    # statistics_print_interval: 1.0   # [s] driver stats log cadence
    # event_message_size_threshold: 1000000000  # [bytes] batch-by-size (~off)
    # mipi_frame_period: -1            # [us] sensor MIPI timing (-1 = auto)
    #
    # Note: trigger_OUT is not exposed — EVK4 (Gen4) does not support it.
