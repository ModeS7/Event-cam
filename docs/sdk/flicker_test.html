<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EVK4 flicker test (frequency pipeline)</title>
<style>
  html, body { margin: 0; height: 100%; background: #404040; overflow: hidden;
               font: 14px/1.4 system-ui, sans-serif; color: #ddd; }
  #wrap { display: flex; align-items: center; justify-content: center; height: 100%; }
  /* The flashing region is a CENTERED PATCH, not the whole screen, to keep the
     strobe area (and eye strain) small. Point the camera at this patch. */
  #patch { width: 40vmin; height: 40vmin; background: #101010; border-radius: 4px; }
  #hud { position: fixed; top: 10px; left: 12px; right: 12px; z-index: 10;
         background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 5px; }
  #warn { color: #ffd24d; font-weight: 600; }
  b { color: #fff; }
</style>
</head>
<body>
<div id="hud">
  <div id="warn">Photosensitivity warning: this flashes. Keep the patch small,
    do not stare at it, and never run it fullscreen.</div>
  <div id="status"></div>
  <div>Up/Down = slower/faster &nbsp;|&nbsp; Left/Right = smaller/bigger patch
    &nbsp;|&nbsp; aim the camera at the patch, watch <b>/event_camera/frequency_image</b></div>
</div>
<div id="wrap"><div id="patch"></div></div>
<script>
// Frame-locked flicker for the evk4_sdk_advanced `frequency` pipeline. The patch
// toggles every N refresh frames, a clean square wave at refresh/(2*N) Hz -- what
// FrequencyMapAsyncAlgorithm detects. A small patch (not fullscreen) keeps both
// the eye strain and the event rate down; if the node warns it is dropping events
// (overloaded), shrink the patch / step away, or cap erc_rate in your params.
let n = 2;                 // refresh frames per half-cycle (2 -> ~15 Hz on a 60 Hz screen)
let size = 40;             // patch size, vmin
let frame = 0, on = false;
let lastT = performance.now(), refresh = 60;
const patch = document.getElementById('patch');
const status = document.getElementById('status');

function loop(t) {
  const dt = t - lastT; lastT = t;
  if (dt > 0 && dt < 100) refresh = refresh * 0.9 + (1000 / dt) * 0.1;
  if (++frame >= n) { frame = 0; on = !on; patch.style.background = on ? '#e0e0e0' : '#101010'; }
  const flash = refresh / (2 * n);
  status.textContent =
    `~${flash.toFixed(0)} Hz flicker  (monitor ~${refresh.toFixed(0)} Hz, N=${n}, patch ${size} vmin)`;
  requestAnimationFrame(loop);
}
addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')   n = n + 1;                       // lower frequency
  if (e.key === 'ArrowDown') n = Math.max(1, n - 1);          // higher frequency (cap refresh/2)
  if (e.key === 'ArrowLeft')  { size = Math.max(15, size - 5); patch.style.width = patch.style.height = size + 'vmin'; }
  if (e.key === 'ArrowRight') { size = Math.min(80, size + 5); patch.style.width = patch.style.height = size + 'vmin'; }
});
requestAnimationFrame(loop);
</script>
</body>
</html>
