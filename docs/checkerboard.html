<!DOCTYPE html>
<html>
<head>
<title>Flickering checkerboard for event-camera calibration</title>
<style>
html,body{margin:0;height:100%;background:#888;display:flex;align-items:center;justify-content:center}
canvas{image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Flickering checkerboard for evk4_calibration (see docs/calibration.md).
// Open fullscreen (F11) on the screen the camera looks at.
//
// Defaults match the calibrator's defaults: 9x7 squares = 8x6 INNER corners
// (board_size:=8x6), blinking at 2 Hz. Override via URL parameters, e.g.
//   checkerboard.html?cols=10&rows=8&hz=4
// cols/rows are SQUARES; the calibrator's board_size is (cols-1)x(rows-1).
// Keep the blink slow: much faster than a few Hz and a rendered frame mixes
// both polarities, smearing the board.
const q = new URLSearchParams(location.search);
const COLS = parseInt(q.get('cols') || '9');
const ROWS = parseInt(q.get('rows') || '7');
const HZ = parseFloat(q.get('hz') || '2');
const c = document.getElementById('c'), x = c.getContext('2d');
let inv = false;
function draw() {
  const s = Math.floor(Math.min(innerWidth / COLS, innerHeight / ROWS) * 0.9);
  c.width = COLS * s; c.height = ROWS * s;
  for (let r = 0; r < ROWS; r++) {
    for (let k = 0; k < COLS; k++) {
      x.fillStyle = ((r + k) % 2 === 0) !== inv ? '#000' : '#fff';
      x.fillRect(k * s, r * s, s, s);
    }
  }
}
setInterval(() => { inv = !inv; draw(); }, 1000 / (2 * HZ));
window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
